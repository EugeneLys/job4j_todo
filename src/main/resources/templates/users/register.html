<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:insert="~{fragments/header :: header}"></head>
<body>
<div th:replace="~{fragments/navigation :: navigation}"></div>
<div class="container">
    <form class="mt-3" th:action="@{/users/register}" th:object="${user}" method="post">
        <div class="mb-3">
            <label for="name" class="form-label"><b>Name</b></label>
            <input type="text" class="form-control" id="name" name="name" placeholder="Иван" required>
        </div>
        <div class="mb-3">
            <label for="login" class="form-label"><b>Login</b></label>
            <input type="text" class="form-control" id="login" name="login" placeholder="ivan@mail.ru" required>
        </div>
        <div class="mb-3">
            <label for="password" class="form-label"><b>Password</b></label>
            <input type="password" class="form-control" id="password" name="password" required>
        </div>
        <div class="mb-3 row">
            <div class="col-6"></div>
            <div class="col-6">
                <div class="row">
                    <div class="col-6"><a class="btn btn-danger w-100"
                                          th:href="@{/users}">Back</a></div>
                    <div class="col-6"><button class="btn btn-primary w-100"
                                               type="submit">Save</button>
                    </div>
                </div>
            </div>
        </div>
    </form>
</div>
</body>
</html>
