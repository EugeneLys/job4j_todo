<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:include="fragments/header :: header"></head>
<body>
<div th:replace="fragments/navigation :: navigation"></div>
<div class="container">
    <form class="mt-3" th:action="@{/tasks/update}" method="post" th:object="${task}">
        <input type="hidden" th:field="*{id}" />
        <input type="hidden" th:field="*{created}" />
        <div class="mb-3">
            <label for="name" class="form-label"><b>Name</b></label>
            <input type="text" class="form-control" id="name" name="name"
                   th:field="*{name}"
                   placeholder="Name the task">
        </div>
        <div class="mb-3">
            <label for="description" class="form-label"><b>Description</b></label>
            <textarea class="form-control" id="description"
                      name="description" th:field="*{description}"
                      rows="25" placeholder="What's the task to do"></textarea>
        </div>
        <div class="row mt-4">
            <div class="col-md-4"></div>
            <div class="col-md-2 col-sm-3 mb-2">
                <a class="btn btn-light w-100" th:href="@{/tasks}">Back</a>
            </div>
            <div class="col-md-2 col-sm-3 mb-2">
                <a class="btn btn-danger w-100" th:href="@{/tasks/delete/{id}(id=${task.id})}">Delete</a>
            </div>
            <div class="col-md-2 col-sm-3 mb-2">
                <button class="btn btn-primary w-100" type="submit">Update</button>
            </div>
            <div th:if="${!task.done}" class="col-md-2 col-sm-4 mb-2">
                <a th:if="${!task.done}" class="btn btn-success w-100"
                   th:href="@{/tasks/done/{id}(id=${task.id})}">Done</a>
                <a th:if="${task.done}" class="btn btn-warning w-100"
                   th:href="@{/tasks/done/{id}(id=${task.id})}">In Work</a>
            </div>
        </div>
    </form>
</div>
<footer th:include="fragments/footer :: footer"></footer>
</body>
</html>
